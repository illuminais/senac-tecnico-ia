name = "lms-senac-tecnico-ia"
main = "worker/src/index.ts"
compatibility_date = "2024-01-01"

# Cloudflare D1 — banco de dados SQLite distribuído
[[d1_databases]]
binding = "DB"
database_name = "lms-progress"
database_id   = "0c14aadc-4dab-4338-a7bd-68a1336f8547"

# Vars públicas (não são segredo, ficam no bundle/commit normalmente)
[vars]
GOOGLE_CLIENT_ID = "280473164877-oedruom4e128g75a6279bimt4e1l35k5.apps.googleusercontent.com"  # Google Cloud Console > OAuth client (tipo Web)
RESEND_FROM      = "LMS Senac <onboarding@resend.dev>"  # trocar por remetente de domínio verificado em produção
ALLOWED_ORIGINS  = "http://localhost:5173,https://senac-lms.pages.dev"  # origens autorizadas p/ link de reset de senha
STUDENT_EMAIL_DOMAINS = "aluno.pr.senac.br,escola.pr.gov.br"  # domínios de email autorizados a criar conta de aluno

# Segredos (nunca commitar) — configurar com:
#   wrangler secret put JWT_SECRET
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put GOOGLE_CLIENT_SECRET
# ADMIN_USERNAME/ADMIN_PASSWORD não são mais usados — login agora é via tabela
# admin_users (platform/scripts/create-admin.mjs cria o primeiro admin).

